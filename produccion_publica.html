<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trazabilidad pública | La Jamonera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Viga&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./CSS/style.css">
  <link rel="icon" type="image/webp" href="./IMG/La Jamonera Cerdito.webp">
</head>
<body>
  <main class="contenido py-3">
    <div id="publicTraceLoading" class="public-trace-spinner"><img src="./IMG/Meta-ai-logo.webp" alt="Cargando" class="meta-spinner-login"></div>
    <section id="publicTraceData" class="d-none"></section>
  </main>

  <div class="modal fade" id="imageViewerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content ios-modal image-viewer-modal">
        <div class="modal-header ios-modal-header">
          <h5 class="modal-title ios-modal-title">Vista de imagen</h5>
          <button type="button" class="btn-close ios-modal-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body ios-modal-body">
          <div class="image-viewer-controls image-viewer-controls-inventario">
            <button id="viewerBackBtn" type="button" class="btn ios-btn ios-btn-secondary"><i class="fa-solid fa-arrow-left"></i><span>Volver</span></button>
            <button id="viewerPrevBtn" type="button" class="btn ios-btn ios-btn-secondary"><i class="fa-solid fa-chevron-left"></i></button>
            <button id="viewerZoomOutBtn" type="button" class="btn ios-btn ios-btn-secondary"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
            <button id="viewerZoomInBtn" type="button" class="btn ios-btn ios-btn-secondary"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button id="viewerNextBtn" type="button" class="btn ios-btn ios-btn-secondary"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
          <div id="viewerStage" class="viewer-stage">
            <span id="viewerStageSpinner" class="thumb-loading"><img src="./IMG/Meta-ai-logo.webp" alt="Cargando" class="meta-spinner-login"></span>
            <iframe id="viewerDocument" src="" title="Documento adjunto" class="viewer-document d-none"></iframe>
            <img id="viewerImage" src="" alt="Imagen adjunta">
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="app-footer app-footer-white">
  <div
    class="footer-main"
    style="width: min(1200px, 100%); display: flex !important; justify-content: space-around !important; gap: 18px; flex-wrap: wrap;"
  >
    <div class="footer-brand-block">
      <img src="./IMG/La Jamonera Cerdito.webp" alt="Logo La Jamonera" class="footer-brand-logo">
      <div>
        <h3 class="footer-brand-title">La Jamonera</h3>
        <p class="footer-brand-text">Back Office</p>
      </div>
    </div>
  </div>

  <div class="footer-divider" aria-hidden="true"></div>

  <p class="footer-legal">
    El uso de este sitio web implica la aceptación de los términos, condiciones y políticas de privacidad de
    <a href="https://asesoriabromatologicaros.com.ar/index.html" target="_blank" rel="noopener noreferrer">
      Asesoria Bromatologica Rosario
    </a>.
    Las imagenes son a modo ilustrativo.
  </p>

  <p class="footer-copy">
    © Copyright <span id="currentYear"></span> - Back Office para empresas, powered by
    <a href="https://asesoriabromatologicaros.com.ar/index.html" target="_blank" rel="noopener noreferrer">
      ABR
    </a>
    - Author: Ponzoni Lucas
    <a
      class="footer-mail"
      href="mailto:pablomanuelscalise@gmail.com"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Enviar email"
    >
      <i class="fa-regular fa-envelope"></i>
    </a>
  </p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="./JS/firebase-init.js"></script>
  <script src="./JS/planilla_produccion.js"></script>
  <script src="./JS/produccion_publica.js"></script>
</body>
</html>
